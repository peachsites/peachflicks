<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeachFlicks | Movie Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>🍑 PeachFlicks</h1>
        <p>Discover your next favorite movie.</p>
    </header>

    <section class="controls-container">
        <form id="search-form" class="search-form">
            <input type="text" id="search-input" placeholder="Search by movie title..." autocomplete="off">
            
            <select id="genre-select">
                <option value="">All Genres</option>
                <option value="28">Action</option>
                <option value="35">Comedy</option>
                <option value="18">Drama</option>
                <option value="878">Sci-Fi</option>
                <option value="27">Horror</option>
            </select>

            <input type="number" id="year-input" placeholder="Year (e.g. 2024)" min="1900" max="2027">
            
            <button type="submit" id="search-btn">Find Movies</button>
        </form>
    </section>

    <main class="movie-container">
        <div id="movie-grid" class="movie-grid">
            </div>
    </main>

    <section class="pagination-container">
        <button id="prev-page" class="btn-pagination" disabled>Previous</button>
        <span id="page-indicator">Page 1</span>
        <button id="next-page" class="btn-pagination" disabled>Next</button>
    </section>

    <footer class="app-footer">
        <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" alt="TMDB Logo" class="tmdb-logo">
        <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
    </footer>

    <div id="movie-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div class="modal-body">
                <img id="modal-img" src="" alt="Movie Poster">
                <div class="modal-info">
                    <h2 id="modal-title">Movie Title</h2>
                    <p id="modal-meta">2024 • ⭐ 8.5</p>
                    <p id="modal-overview">Plot overview goes here...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
